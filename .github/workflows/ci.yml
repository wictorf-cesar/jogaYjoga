name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-format:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Usa head_ref em PRs para permitir o push de volta
          ref: ${{ github.head_ref }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version-file: "pyproject.toml"

      - name: Auto-fix & Lint
        run: |
          uv run ruff format .
          uv run ruff check . --fix --unsafe-fixes 
          uv run bandit -r app/

      - name: Commit changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix and linting"
          skip_fetch: false 
